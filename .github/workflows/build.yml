name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build EXE (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # vgamepad's setup.py does `import vgamepad` to read its version,
      # which loads ViGEmClient.dll via ctypes. This hangs on any machine
      # without the ViGEmBus kernel driver installed.
      #
      # Solution: skip pip install vgamepad entirely. Download the source
      # tarball from GitHub, extract it, and copy the vgamepad/ package
      # directly into Python's site-packages. setup.py is NEVER executed,
      # so no driver is needed at build time. The user installs ViGEmBus
      # before running the EXE.
      - name: Install vgamepad manually (skip setup.py)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller

          # Download vgamepad source tarball from GitHub
          $vgamepadVersion = "0.1.0"
          $tarballUrl = "https://github.com/yannbouteiller/vgamepad/archive/refs/tags/v$vgamepadVersion.tar.gz"
          Write-Host "Downloading vgamepad v$vgamepadVersion from GitHub..."
          Invoke-WebRequest -Uri $tarballUrl -OutFile "$env:TEMP\vgamepad.tar.gz"

          # Extract
          Write-Host "Extracting..."
          tar -xzf "$env:TEMP\vgamepad.tar.gz" -C "$env:TEMP"

          # Find the extracted directory
          $extractedDir = Get-ChildItem "$env:TEMP\vgamepad-*" -Directory | Select-Object -First 1
          if (-not $extractedDir) {
              throw "Could not find extracted vgamepad directory."
          }
          Write-Host "Extracted to: $($extractedDir.FullName)"

          # Find Python's site-packages directory
          $sitePackages = python -c "import site; print(site.getsitepackages()[0])"
          Write-Host "Python site-packages: $sitePackages"

          # Copy the vgamepad/ package into site-packages
          Copy-Item "$($extractedDir.FullName)\vgamepad" -Destination $sitePackages -Recurse -Force
          Write-Host "vgamepad package copied to site-packages."

          # Patch virtual_gamepad.py: the REAL culprit is a module-level
          # VBUS = VBus() line. VBus.__init__ calls vigem_alloc() + vigem_connect()
          # which loads ViGEmClient.dll and hangs without the driver.
          #
          # Fix: replace eager VBus creation with None, and patch VGamepad.__init__
          # to lazily create VBUS on first use. At runtime, the user has the real
          # ViGEmBus driver installed, so it works normally.
          $vgPath = Join-Path $sitePackages "vgamepad\win\virtual_gamepad.py"
          $vgContent = Get-Content $vgPath -Raw

          # 1. Defer global VBus creation
          $vgContent = $vgContent -replace 'VBUS\s*=\s*VBus\(\)', 'VBUS = None  # deferred: created lazily in VGamepad.__init__'

          # 2. Make VGamepad.__init__ create VBUS on first use
          $LF = "`n"
          $oldInit = "class VGamepad(ABC):${LF}    def __init__(self):${LF}        self.vbus = VBUS"
          $newInit = "class VGamepad(ABC):${LF}    def __init__(self):${LF}        global VBUS${LF}        if VBUS is None:${LF}            VBUS = VBus()${LF}        self.vbus = VBUS"
          $vgContent = $vgContent -replace [regex]::Escape($oldInit), $newInit

          [System.IO.File]::WriteAllText($vgPath, $vgContent)
          Write-Host "Patched virtual_gamepad.py: VBUS deferred, VGamepad.__init__ does lazy creation."

          # Verify import works (should NOT load ViGEmClient.dll now)
          python -c "import vgamepad; print('vgamepad imported OK')"
          $patchedContent = Get-Content $vgPath -Raw
          if ($patchedContent -match 'VBUS\s*=\s*None') {
              Write-Host "Patch verified: VBUS = None found in virtual_gamepad.py"
          } else {
              Write-Host "WARNING: patch may not have applied correctly."
          }

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name GamepadMacro gamepad_macro.py

      - name: Copy config.json to dist
        run: |
          Copy-Item config.json dist/config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamepadMacro-Windows
          path: |
            dist/GamepadMacro.exe
            dist/config.json
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GamepadMacro.exe
            dist/config.json
          generate_release_notes: true
