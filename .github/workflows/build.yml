name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build EXE (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ViGEmBus driver
        shell: pwsh
        run: |
          Write-Host "Downloading ViGEmBus v1.22.0..."
          Invoke-WebRequest -Uri "https://github.com/nefarius/ViGEmBus/releases/download/v1.22.0/ViGEmBus_1.22.0_x64_x86_arm64.exe" -OutFile "$env:TEMP\VigemBus.exe"
          Write-Host "Installing silently (may require admin)..."
          try {
              $proc = Start-Process -FilePath "$env:TEMP\VigemBus.exe" -ArgumentList "/S" -Wait -PassThru -NoNewWindow
              if ($proc.ExitCode -eq 0) {
                  Write-Host "ViGEmBus install completed (exit code 0)."
              } else {
                  Write-Host "ViGEmBus install exited with code $($proc.ExitCode)."
              }
          } catch {
              Write-Host "Warning: ViGEmBus install failed: $_"
          }
          # Give the kernel driver a few seconds to register if installed
          Start-Sleep -Seconds 5

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Install non-driver deps first so they're cached
          pip install pygame pyinstaller
          # Install vgamepad with --no-build-isolation to reuse the system env
          # where ViGEmBus was just installed. Timeout after 2 min if it hangs.
          try {
              $job = Start-Job -ScriptBlock {
                  pip install vgamepad --no-build-isolation 2>&1
              }
              $result = Wait-Job $job -Timeout 120
              if ($null -eq $result) {
                  Write-Host "WARNING: pip install vgamepad timed out after 2 minutes."
                  Write-Host "ViGEmBus driver is likely not active in this CI environment."
                  Write-Host "Stopping the hung job..."
                  Stop-Job $job
                  Remove-Job $job
                  throw "vgamepad install timed out — see README for local build instructions."
              } else {
                  Receive-Job $job
                  Remove-Job $job
                  Write-Host "vgamepad installed successfully."
              }
          } catch {
              Write-Host "ERROR: $_"
              throw
          }
        timeout-minutes: 5

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name GamepadMacro gamepad_macro.py

      - name: Copy config.json to dist
        run: |
          Copy-Item config.json dist/config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamepadMacro-Windows
          path: |
            dist/GamepadMacro.exe
            dist/config.json
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GamepadMacro.exe
            dist/config.json
          generate_release_notes: true
