name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build EXE (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # vgamepad's setup.py does `import vgamepad` to read the version,
      # which calls ctypes.WinDLL("ViGEmClient") at module init.
      # Without the real driver, this hangs forever.
      # Fix: drop a dummy ViGEmClient.dll with empty exported functions
      # into System32. setup.py only needs the DLL to load, not to work.
      # The real driver is only required at RUNTIME on the user's machine.
      - name: Place dummy ViGEmClient.dll for build
        shell: pwsh
        run: |
          Write-Host "Checking for gcc (MinGW)..."
          $gccPath = Get-Command gcc -ErrorAction SilentlyContinue
          if (-not $gccPath) {
              throw "gcc not found on PATH. windows-latest runner should have MinGW gcc pre-installed."
          }
          Write-Host "gcc found at: $($gccPath.Source)"

          $stub = @"
          // Dummy ViGEmClient.dll - empty exports to satisfy vgamepad import at build time.
          // The real ViGEmBus driver must be installed by the user before running the EXE.
          __declspec(dllexport) void* ViGEmAlloc(void) { return (void*)0; }
          __declspec(dllexport) void  ViGEmFree(void* p) {}
          __declspec(dllexport) int   ViGEmConnect(void* p) { return 0; }
          __declspec(dllexport) void  ViGEmDisconnect(void* p) {}
          __declspec(dllexport) void* ViGEmTargetX360Alloc(void* p) { return (void*)0; }
          __declspec(dllexport) void* ViGEmTargetDS4Alloc(void* p) { return (void*)0; }
          __declspec(dllexport) void  ViGEmTargetFree(void* p, void* t) {}
          __declspec(dllexport) int   ViGEmTargetAdd(void* p, void* t) { return 0; }
          __declspec(dllexport) int   ViGEmTargetRemove(void* p, void* t) { return 0; }
          __declspec(dllexport) int   ViGEmTargetX360Update(void* p, void* t, int s) { return 0; }
          __declspec(dllexport) int   ViGEmTargetDS4Update(void* p, void* t, int s) { return 0; }
          __declspec(dllexport) int   ViGEmTargetX360RegisterNotification(void* p, void* t, void* c, void* d) { return 0; }
          __declspec(dllexport) int   ViGEmTargetDS4RegisterNotification(void* p, void* t, void* c, void* d) { return 0; }
          __declspec(dllexport) int   ViGEmTargetX360UnregisterNotification(void* t) { return 0; }
          __declspec(dllexport) int   ViGEmTargetDS4UnregisterNotification(void* t) { return 0; }
          "@
          Set-Content -Path "$env:TEMP\ViGEmClient_stub.c" -Value $stub
          gcc -shared -o "$env:TEMP\ViGEmClient.dll" "$env:TEMP\ViGEmClient_stub.c"
          if (-not (Test-Path "$env:TEMP\ViGEmClient.dll")) {
              throw "Failed to compile dummy ViGEmClient.dll."
          }
          Copy-Item "$env:TEMP\ViGEmClient.dll" "C:\Windows\System32\ViGEmClient.dll" -Force
          Write-Host "Dummy ViGEmClient.dll placed in System32 (size: $((Get-Item 'C:\Windows\System32\ViGEmClient.dll').Length) bytes)."

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame pyinstaller setuptools wheel
          # --no-build-isolation: reuse system env where dummy ViGEmClient.dll is in System32.
          # This prevents pip from spawning a fresh env that can't see our DLL.
          pip install vgamepad --no-build-isolation
        timeout-minutes: 5

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name GamepadMacro gamepad_macro.py

      - name: Copy config.json to dist
        run: |
          Copy-Item config.json dist/config.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GamepadMacro-Windows
          path: |
            dist/GamepadMacro.exe
            dist/config.json
          retention-days: 30

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/GamepadMacro.exe
            dist/config.json
          generate_release_notes: true
